<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1a3a5c"/>
      <stop offset="100%" stop-color="#0d2640"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="64" height="64" rx="14" fill="url(#bg)"/>
  <!-- Outer eye shape -->
  <path d="M32 14 C20 14, 8 32, 8 32 C8 32, 20 50, 32 50 C44 50, 56 32, 56 32 C56 32, 44 14, 32 14Z" fill="none" stroke="#c8922a" stroke-width="2.2"/>
  <!-- Circuit lines -->
  <line x1="8" y1="32" x2="4" y2="32" stroke="#c8922a" stroke-width="1.8"/>
  <line x1="11" y1="23" x2="6" y2="19" stroke="#c8922a" stroke-width="1.4"/>
  <line x1="11" y1="41" x2="6" y2="45" stroke="#c8922a" stroke-width="1.4"/>
  <line x1="56" y1="32" x2="60" y2="32" stroke="#c8922a" stroke-width="1.8"/>
  <line x1="53" y1="23" x2="58" y2="19" stroke="#c8922a" stroke-width="1.4"/>
  <line x1="53" y1="41" x2="58" y2="45" stroke="#c8922a" stroke-width="1.4"/>
  <!-- Outer ring (gold dashed) -->
  <circle cx="32" cy="32" r="12" fill="none" stroke="#c8922a" stroke-width="1.8" stroke-dasharray="10 3.5"/>
  <!-- Middle ring -->
  <circle cx="32" cy="32" r="8" fill="none" stroke="#fff" stroke-width="1.6"/>
  <!-- Inner ring -->
  <circle cx="32" cy="32" r="5" fill="none" stroke="#fff" stroke-width="1.2"/>
  <!-- Pupil -->
  <circle cx="32" cy="32" r="2.5" fill="#fff"/>
  <!-- Highlight -->
  <circle cx="30.5" cy="30" r="1" fill="#fff" opacity="0.6"/>
</svg>
